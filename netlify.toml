# Netlify — Next.js (App Router)
# https://docs.netlify.com/frameworks/next-js/overview/

[build]
  # Create SQLite schema + seed blog posts before Next.js pre-renders CMS pages
  command = "npm run db:setup && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Required for prisma generate during npm install (override in Netlify UI for production DB)
  DATABASE_URL = "file:./prisma/dev.db"

[[plugins]]
  package = "@netlify/plugin-nextjs"
