# Netlify — Next.js (App Router)
# https://docs.netlify.com/frameworks/next-js/overview/

[build]
  # Create SQLite schema + seed blog posts before Next.js pre-renders CMS pages
  command = "npm run db:setup && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY = "true"
  DATABASE_URL = "file:./prisma/dev.db"
  AUTH_SECRET = "mapims-change-this-secret-in-netlify-ui"
  ADMIN_EMAIL = "admin@mapims.edu.in"
  ADMIN_PASSWORD = "admin123"

# Bundle SQLite DB into serverless functions for admin API routes
[functions]
  included_files = ["prisma/**", ".netlify/prisma/**", ".next/prisma/**", "node_modules/better-sqlite3/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"
